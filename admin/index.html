<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | FranklinTech Hub</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-particles" id="loginParticles"></div>
  <div class="login-card">
    <div class="login-logo">
      <img src="../unnamed-removebg-preview.png" alt="Logo" class="sidebar-logo" style="width:72px;height:72px;border-radius:16px;object-fit:contain">
    </div>
    <h1 class="login-title">Welcome Back</h1>
    <p class="login-subtitle">Sign in to your admin dashboard</p>
    <div class="login-error" id="loginError">Invalid email or password</div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="Franklintechhubsolutions@gmail.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div style="position: relative;">
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required style="padding-right: 40px;">
          <button type="button" class="password-toggle" id="togglePassword" title="Toggle password visibility">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
// Particles
(function(){
  const c=document.getElementById('loginParticles');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='login-particle';
    const s=Math.random()*4+2;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*5}s`;
    c.appendChild(p);
  }
})();

(async function() {
  try {
    await window.initSupabase();
  } catch(e) {
    console.error('Failed to initialize Supabase:', e);
    const err=document.getElementById('loginError');
    err.classList.add('show');
    err.textContent='Server not reachable. Make sure the server is running (node server.js).';
    return;
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const email=document.getElementById('loginEmail').value.trim();
    const pw=document.getElementById('loginPassword').value;
    const err=document.getElementById('loginError');

    if(!email.includes('@')){
      err.classList.add('show');
      err.textContent='Please enter a valid email address.';
      setTimeout(()=>err.classList.remove('show'),3000);
      return;
    }

    const btn=document.getElementById('loginBtn');
    btn.disabled=true;
    btn.textContent='Signing in...';

    try {
      const success = await AdminAuth.login(email,pw);
      if(success){
        window.location.href='dashboard.html';
      } else {
        err.classList.add('show');
        err.textContent='Invalid email or password. Please try again.';
        setTimeout(()=>err.classList.remove('show'),3000);
      }
    } catch(loginErr) {
      console.error('Login error:', loginErr);
      err.classList.add('show');
      err.textContent='Connection error. Please check the server.';
      setTimeout(()=>err.classList.remove('show'),4000);
    } finally {
      btn.disabled=false;
      btn.textContent='Sign In';
    }
  });

  // If already logged in, redirect
  try {
    if(await AdminAuth.isLoggedIn()) window.location.href='dashboard.html';
  } catch(e) { /* not logged in */ }

  // Password toggle logic
  const toggleBtn = document.getElementById('togglePassword');
  const pwInput = document.getElementById('loginPassword');
  toggleBtn.addEventListener('click', () => {
    const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
    pwInput.setAttribute('type', type);
    toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
  });
})();
</script>
</body>
</html>
